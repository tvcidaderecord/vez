<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sistema de Vez – Emissora</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0c0c14;
    --surface:   #13131f;
    --surface2:  #1c1c2e;
    --border:    #2a2a40;
    --accent:    #e8384f;
    --accent2:   #ff6b35;
    --gold:      #f5c842;
    --text:      #e8e8f0;
    --muted:     #7878a0;
    --green:     #2ecc71;
    --radius:    12px;
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }

  html, body { height: 100%; }
  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
    pointer-events: none;
  }

  .app { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 24px 80px; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 28px 0 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 36px;
  }
  .logo {
    font-family: var(--font-head);
    font-size: 1.4rem; font-weight: 800; letter-spacing: -0.02em;
    display: flex; align-items: center; gap: 10px;
  }
  .logo .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(232,56,79,.6)} 50%{box-shadow:0 0 0 8px rgba(232,56,79,0)} }

  .header-links { display: flex; gap: 12px; }
  .btn-link {
    font-family: var(--font-body); font-size: .8rem; font-weight: 500;
    color: var(--muted); text-decoration: none;
    padding: 6px 14px; border: 1px solid var(--border); border-radius: 99px;
    transition: all .2s;
  }
  .btn-link:hover { color: var(--text); border-color: var(--muted); }

  .tabs {
    display: flex; gap: 4px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 4px;
    margin-bottom: 32px; width: fit-content;
  }
  .tab {
    font-family: var(--font-head); font-size: .85rem; font-weight: 600;
    padding: 9px 22px; border-radius: 8px; border: none; cursor: pointer;
    color: var(--muted); background: transparent; transition: all .2s;
  }
  .tab.active { background: var(--accent); color: #fff; }

  .panel { display: none; }
  .panel.active { display: block; animation: fadeUp .3s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }

  /* ── Vez Card ── */
  .vez-hero {
    background: linear-gradient(135deg, var(--surface2) 0%, #1e1030 100%);
    border: 1px solid var(--border);
    border-radius: 20px; padding: 36px 40px;
    display: flex; align-items: center; gap: 40px;
    position: relative; overflow: hidden;
    margin-bottom: 28px;
  }
  .vez-hero::before {
    content: 'VEZ';
    position: absolute; right: -10px; top: 50%; transform: translateY(-50%);
    font-family: var(--font-head); font-size: 9rem; font-weight: 800;
    color: rgba(255,255,255,.025); line-height: 1; pointer-events: none;
  }
  .vez-avatar {
    width: 80px; height: 80px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-head); font-size: 2rem; font-weight: 800;
    color: #fff; flex-shrink: 0;
    box-shadow: 0 0 40px rgba(232,56,79,.4);
  }
  .vez-info { flex: 1; }
  .vez-label { font-size: .75rem; font-weight: 500; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 4px; }
  .vez-nome { font-family: var(--font-head); font-size: 2rem; font-weight: 800; line-height: 1.1; }
  .vez-tel { font-size: .9rem; color: var(--muted); margin-top: 6px; }
  .vez-badge {
    display: inline-block; margin-top: 10px;
    background: rgba(46,204,113,.15); color: var(--green);
    border: 1px solid rgba(46,204,113,.3); border-radius: 99px;
    font-size: .72rem; font-weight: 600; padding: 3px 12px; letter-spacing: .05em;
  }
  .btn-pular {
    font-family: var(--font-head); font-weight: 700; font-size: .85rem;
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); border-radius: 99px; padding: 10px 22px;
    cursor: pointer; transition: all .2s; white-space: nowrap;
  }
  .btn-pular:hover { border-color: var(--gold); color: var(--gold); }

  /* ── Form ── */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 28px 32px; margin-bottom: 20px;
  }
  .card-title {
    font-family: var(--font-head); font-size: 1.1rem; font-weight: 700;
    margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
  }
  .card-title .icon { font-size: 1.2rem; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media(max-width:640px){ .form-grid { grid-template-columns: 1fr; } }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1/-1; }
  label { font-size: .78rem; font-weight: 500; color: var(--muted); letter-spacing: .05em; text-transform: uppercase; }
  input, textarea {
    font-family: var(--font-body); font-size: .95rem;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; padding: 11px 14px;
    outline: none; transition: border-color .2s, box-shadow .2s; resize: vertical;
  }
  input:focus, textarea:focus {
    border-color: var(--accent); box-shadow: 0 0 0 3px rgba(232,56,79,.15);
  }
  textarea { min-height: 100px; }

  /* ── Botão único de envio ── */
  .btn-primary {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    font-family: var(--font-head); font-weight: 700; font-size: 1.05rem;
    background: linear-gradient(135deg, #075e54, #128c7e);
    color: #fff; border: none; border-radius: 12px;
    padding: 16px 32px; cursor: pointer; width: 100%; margin-top: 8px;
    transition: opacity .2s, transform .1s;
    box-shadow: 0 4px 28px rgba(7,94,84,.45);
    position: relative; overflow: hidden;
  }
  .btn-primary:hover { opacity: .9; }
  .btn-primary:active { transform: scale(.98); }
  .btn-primary .wpp-icon { font-size: 1.4rem; }
  .btn-hint {
    font-size: .72rem; font-weight: 400; opacity: .75;
    display: block; margin-top: 2px; letter-spacing: .01em;
  }

  /* ── Aviso grupo ── */
  .grupo-config {
    display: flex; align-items: center; gap: 10px;
    border-radius: 10px; padding: 12px 16px; margin-bottom: 16px;
    font-size: .82rem; color: var(--muted);
    background: rgba(7,94,84,.08); border: 1px solid rgba(18,140,126,.2);
  }
  .grupo-config.warn { background: rgba(232,56,79,.06); border-color: rgba(232,56,79,.2); }
  .grupo-config a { color: #128c7e; text-decoration: none; font-weight: 600; }
  .grupo-config a:hover { text-decoration: underline; }
  .grupo-config .gc-icon { font-size: 1.1rem; flex-shrink: 0; }

  /* ── Vendedores ── */
  .vendedoras-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px; margin-bottom: 24px;
  }
  .vendedora-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px 22px;
    display: flex; align-items: center; gap: 14px; position: relative;
  }
  .vendedora-card.na-vez { border-color: var(--accent); box-shadow: 0 0 20px rgba(232,56,79,.2); }
  .v-avatar {
    width: 46px; height: 46px; border-radius: 50%; flex-shrink: 0;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-head); font-weight: 800; font-size: 1.1rem; color: #fff;
  }
  .v-info { flex: 1; min-width: 0; }
  .v-nome { font-family: var(--font-head); font-weight: 700; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .v-tel { font-size: .8rem; color: var(--muted); margin-top: 2px; }
  .v-vez-tag {
    position: absolute; top: 10px; right: 10px;
    font-size: .65rem; font-weight: 700; letter-spacing: .06em;
    background: var(--accent); color: #fff; border-radius: 99px; padding: 2px 8px;
  }
  .v-actions { display: flex; gap: 6px; }
  .btn-icon {
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); border-radius: 6px; width: 30px; height: 30px;
    cursor: pointer; font-size: .85rem; display: flex; align-items: center; justify-content: center;
    transition: all .2s; flex-shrink: 0;
  }
  .btn-icon:hover { border-color: var(--accent); color: var(--accent); }
  .btn-icon.del:hover { border-color: #e74c3c; color: #e74c3c; }

  /* ── Link grupo ── */
  .grupo-link-card {
    background: var(--surface2); border: 1px dashed var(--border);
    border-radius: var(--radius); padding: 16px 20px; margin-top: 8px;
    display: flex; align-items: center; gap: 12px; font-size: .85rem;
  }
  .grupo-link-card .gl-label { color: var(--muted); flex: 1; white-space: nowrap; }
  .grupo-link-card input { flex: 2; margin: 0; font-size: .85rem; padding: 8px 12px; }
  .btn-save-link {
    font-family: var(--font-head); font-weight: 700; font-size: .8rem;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; padding: 9px 16px;
    cursor: pointer; white-space: nowrap; transition: all .2s; flex-shrink: 0;
  }
  .btn-save-link:hover { border-color: var(--green); color: var(--green); }

  /* ── Histórico ── */
  .hist-table { width: 100%; border-collapse: collapse; font-size: .88rem; }
  .hist-table th {
    text-align: left; font-family: var(--font-head); font-size: .72rem; font-weight: 700;
    letter-spacing: .08em; text-transform: uppercase; color: var(--muted);
    padding: 0 12px 12px; border-bottom: 1px solid var(--border);
  }
  .hist-table td { padding: 14px 12px; border-bottom: 1px solid rgba(255,255,255,.04); vertical-align: top; }
  .hist-table tr:last-child td { border-bottom: none; }
  .hist-table tr:hover td { background: rgba(255,255,255,.02); }
  .badge-nome {
    display: inline-block; background: rgba(232,56,79,.15);
    color: var(--accent); border-radius: 6px; padding: 2px 8px;
    font-size: .8rem; font-weight: 600;
  }
  .msg-cell { color: var(--muted); max-width: 260px; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
    padding: 13px 24px; font-size: .9rem; font-weight: 500;
    display: flex; align-items: center; gap: 8px; z-index: 999;
    transition: transform .35s cubic-bezier(.34,1.56,.64,1), opacity .3s;
    opacity: 0; pointer-events: none; min-width: 200px;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .toast.ok  .ti { color: var(--green); }
  .toast.err .ti { color: var(--accent); }
  .toast.info .ti { color: var(--gold); }

  .empty { text-align: center; padding: 48px 24px; color: var(--muted); }
  .empty .ei { font-size: 2.5rem; margin-bottom: 12px; }
  .empty p { font-size: .9rem; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  .sep { height: 1px; background: var(--border); margin: 24px 0; }
  .overline { font-size: .72rem; font-weight: 600; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">
      <span class="dot"></span>
      Sistema de Vez
    </div>
    <div class="header-links">
      <a href="vez.html" target="_blank" class="btn-link">📺 Painel dos Vendedor(a)s ↗</a>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="setTab('atendimento', this)">📋 Atendimento</button>
    <button class="tab" onclick="setTab('vendedoras', this)">👤 Vendedor(a)s</button>
    <button class="tab" onclick="setTab('historico', this)">📜 Histórico</button>
  </div>

  <!-- ══ PAINEL ATENDIMENTO ══ -->
  <div id="tab-atendimento" class="panel active">

    <div class="vez-hero">
      <div class="vez-avatar" id="vezAvatar">?</div>
      <div class="vez-info">
        <div class="vez-label">Na vez agora</div>
        <div class="vez-nome" id="vezNome">Carregando…</div>
        <div class="vez-tel" id="vezTel"></div>
        <span class="vez-badge">✓ Em atendimento</span>
      </div>
      <button class="btn-pular" onclick="pularVez()">⏭ Pular vez</button>
    </div>

    <div class="card">
      <div class="card-title"><span class="icon">📝</span> Dados do Contato</div>

      <div class="form-grid">
        <div class="form-group">
          <label>Nome / Empresa</label>
          <input type="text" id="fNomeEmpresa" placeholder="Ex: João Silva / Loja ABC" />
        </div>
        <div class="form-group">
          <label>Telefone de contato</label>
          <input type="tel" id="fTelContato" placeholder="(65) 99999-9999" maxlength="15" oninput="mascaraTel(this)" />
        </div>
        <div class="form-group full">
          <label>Mensagens enviadas pelo contato</label>
          <textarea id="fMensagem" placeholder="Cole aqui as mensagens ou descreva o interesse do cliente…"></textarea>
        </div>
      </div>

      <button class="btn-primary" onclick="disparar()">
        <span class="wpp-icon">📲</span>
        <span>
          Enviar para Vendedor(a)
          <span class="btn-hint">abre o WhatsApp e copia a mensagem para o grupo</span>
        </span>
      </button>
    </div>

  </div>

  <!-- ══ PAINEL VENDEDOR(A)S ══ -->
  <div id="tab-vendedoras" class="panel">
    <div class="card">
      <div class="card-title"><span class="icon">✚</span> Cadastrar Vendedor(a)</div>
      <div class="form-grid">
        <div class="form-group">
          <label>Nome</label>
          <input type="text" id="vNome" placeholder="Nome completo" />
        </div>
        <div class="form-group">
          <label>WhatsApp (com DDD)</label>
          <input type="tel" id="vTel" placeholder="(65) 99999-9999" maxlength="15" oninput="mascaraTel(this)" />
        </div>
      </div>
      <input type="hidden" id="vId" />
      <button class="btn-primary" style="margin-top:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 4px 24px rgba(232,56,79,.35)" onclick="salvarVendedora()">
        💾 Salvar Vendedor(a)
      </button>
    </div>

    <div class="sep"></div>
    <div class="overline">Vendedor(a)s cadastrados</div>
    <div class="vendedoras-grid" id="vendedorasGrid">
      <div class="empty"><div class="ei">👤</div><p>Nenhum vendedor(a) cadastrado.</p></div>
    </div>
  </div>

  <!-- ══ PAINEL HISTÓRICO ══ -->
  <div id="tab-historico" class="panel">
    <div class="card" style="padding:0;overflow:hidden">
      <table class="hist-table">
        <thead>
          <tr>
            <th>Data/Hora</th>
            <th>Vendedor(a)</th>
            <th>Cliente / Empresa</th>
            <th>Telefone</th>
            <th>Mensagem</th>
          </tr>
        </thead>
        <tbody id="histBody">
          <tr><td colspan="5"><div class="empty"><div class="ei">📜</div><p>Carregando histórico…</p></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<div class="toast" id="toast">
  <span class="ti" id="toastIcon">✓</span>
  <span id="toastMsg"></span>
</div>

<script>
// ── CONFIG ─────────────────────────────────────────────────
const API = "https://script.google.com/macros/s/AKfycbzDR1XnIS66iQnPY_3XLxeX-0d7TB7M0snf0OhAJhG7jhDV5PgMw8_Fn_y2j-6udDDoaQ/exec";

// ── Estado ─────────────────────────────────────────────────
let vendedoras = [];
let statusVez  = null;
let grupoLink  = localStorage.getItem("grupoLink") || "";

// ── Init ───────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", () => {
  carregarStatus();
  setInterval(carregarStatus, 30000);
});

// ── Máscara de telefone ────────────────────────────────────
function mascaraTel(el) {
  let v = el.value.replace(/\D/g, "").slice(0, 11);
  if (v.length > 10) {
    v = v.replace(/^(\d{2})(\d{5})(\d{4})$/, "($1) $2-$3");
  } else if (v.length > 6) {
    v = v.replace(/^(\d{2})(\d{4})(\d*)$/, "($1) $2-$3");
  } else if (v.length > 2) {
    v = v.replace(/^(\d{2})(\d*)$/, "($1) $2");
  }
  el.value = v;
}

// ── Tabs ───────────────────────────────────────────────────
function setTab(nome, el) {
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById("tab-" + nome).classList.add("active");
  if (el) el.classList.add("active");
  if (nome === "vendedoras") { carregarVendedoras(); }
  if (nome === "historico")  carregarHistorico();
}

// ── API ────────────────────────────────────────────────────
async function get(params) {
  const r = await fetch(API + "?" + new URLSearchParams(params));
  return r.json();
}
async function post(body) {
  const r = await fetch(API, { method: "POST", body: JSON.stringify(body) });
  return r.json();
}

// ── Status / Vez ───────────────────────────────────────────
async function carregarStatus() {
  try {
    const data = await get({ acao: "status_vez" });
    statusVez  = data;
    renderVez(data);
  } catch(e) { console.warn(e); }
}

function renderVez(data) {
  const atual = data.atual;
  if (!atual) {
    document.getElementById("vezNome").textContent   = "Nenhum vendedor(a) cadastrado";
    document.getElementById("vezAvatar").textContent = "?";
    return;
  }
  document.getElementById("vezAvatar").textContent = iniciais(atual.nome);
  document.getElementById("vezNome").textContent   = atual.nome;
  document.getElementById("vezTel").textContent    = formatTel(atual.telefone);
}

async function pularVez() {
  if (!confirm("Deseja pular a vez do vendedor(a) atual?")) return;
  const r = await post({ acao: "pular_vez" });
  if (r.ok) {
    toast("✓", "Vez pulada com sucesso!", "ok");
    await carregarStatus();
  } else {
    toast("✕", r.erro || "Erro ao pular vez", "err");
  }
}

// ── Disparar ───────────────────────────────────────────────
async function disparar() {
  const nomeEmpresa = document.getElementById("fNomeEmpresa").value.trim();
  const telContato  = document.getElementById("fTelContato").value.trim();
  const mensagem    = document.getElementById("fMensagem").value.trim();

  if (!nomeEmpresa) { toast("✕", "Informe o nome do contato / empresa", "err"); return; }
  if (!telContato)  { toast("✕", "Informe o telefone de contato", "err"); return; }
  if (!mensagem)    { toast("✕", "Informe as mensagens do contato", "err"); return; }
  if (!statusVez?.atual?.telefone) {
    toast("✕", "Nenhum vendedor(a) disponível na vez", "err"); return;
  }

  const { nome: vNome, telefone: vTel, id: vId } = statusVez.atual;

  // Mensagem para o vendedor(a)
  const msgVendedor =
    `*Novo contato para orçamento* 📋\n\n` +
    `*Cliente/Empresa:* ${nomeEmpresa}\n` +
    `*Telefone:* ${telContato}\n\n` +
    `*Mensagens do cliente:*\n${mensagem}`;

  // Mensagem para o grupo (copiada na área de transferência)
  const msgGrupo =
    `📋 *Registro de atendimento*\n\n` +
    `*Vendedor(a):* ${vNome}\n` +
    `*Cliente/Empresa:* ${nomeEmpresa}\n` +
    `*Telefone:* ${telContato}\n\n` +
    `*Mensagens do cliente:*\n${mensagem}`;

  // Copia mensagem do grupo para área de transferência
  try { await navigator.clipboard.writeText(msgGrupo); } catch(_) {}

  // Registra no histórico
  await post({
    acao: "registrar_atendimento",
    vendedora_id: vId,
    vendedora_nome: vNome,
    contato: nomeEmpresa,
    telefone_contato: telContato,
    mensagem
  });

  // Abre WhatsApp do vendedor(a)
  const tel = vTel.replace(/\D/g, "");
  window.open(`https://wa.me/55${tel}?text=${encodeURIComponent(msgVendedor)}`, "_blank");

  // Limpa form e atualiza
  document.getElementById("fNomeEmpresa").value = "";
  document.getElementById("fTelContato").value  = "";
  document.getElementById("fMensagem").value    = "";

  toast("✓", `WhatsApp de ${vNome} aberto! Mensagem copiada — cole no grupo.`, "ok");
  await carregarStatus();
}

// ── Vendedor(a)s ───────────────────────────────────────────
async function carregarVendedoras() {
  const data = await get({ acao: "listar_vendedoras" });
  vendedoras = data.vendedoras || [];
  renderVendedoras();
}

function renderVendedoras() {
  const grid = document.getElementById("vendedorasGrid");
  if (!vendedoras.length) {
    grid.innerHTML = `<div class="empty"><div class="ei">👤</div><p>Nenhum vendedor(a) cadastrado.</p></div>`;
    return;
  }
  const vezIdx = statusVez?.vezIndex ?? -1;
  const total  = vendedoras.length;
  grid.innerHTML = vendedoras.map((v, i) => {
    const naVez = (i === vezIdx % total);
    return `
    <div class="vendedora-card ${naVez ? "na-vez" : ""}">
      <div class="v-avatar">${iniciais(v.nome)}</div>
      <div class="v-info">
        <div class="v-nome">${v.nome}</div>
        <div class="v-tel">${formatTel(v.telefone)}</div>
      </div>
      ${naVez ? '<span class="v-vez-tag">NA VEZ</span>' : ""}
      <div class="v-actions">
        <button class="btn-icon" onclick="editarVendedora('${v.id}')" title="Editar">✏️</button>
        <button class="btn-icon del" onclick="deletarVendedora('${v.id}')" title="Remover">🗑</button>
      </div>
    </div>`;
  }).join("");
}

async function salvarVendedora() {
  const nome = document.getElementById("vNome").value.trim();
  const tel  = document.getElementById("vTel").value.trim();
  const id   = document.getElementById("vId").value;
  if (!nome || !tel) { toast("✕", "Preencha nome e telefone", "err"); return; }
  const r = await post({ acao: "salvar_vendedora", id: id || undefined, nome, telefone: tel });
  if (r.ok) {
    toast("✓", r.mensagem, "ok");
    document.getElementById("vNome").value = "";
    document.getElementById("vTel").value  = "";
    document.getElementById("vId").value   = "";
    await carregarVendedoras();
    await carregarStatus();
  } else { toast("✕", r.erro, "err"); }
}

function editarVendedora(id) {
  const v = vendedoras.find(x => x.id === id);
  if (!v) return;
  document.getElementById("vNome").value = v.nome;
  document.getElementById("vTel").value  = formatTel(v.telefone);
  document.getElementById("vId").value   = v.id;
  window.scrollTo({ top: 0, behavior: "smooth" });
}

async function deletarVendedora(id) {
  const v = vendedoras.find(x => x.id === id);
  if (!confirm(`Remover ${v?.nome || "vendedor(a)"}?`)) return;
  const r = await post({ acao: "deletar_vendedora", id });
  if (r.ok) {
    toast("✓", "Vendedor(a) removido", "ok");
    await carregarVendedoras();
    await carregarStatus();
  } else { toast("✕", r.erro, "err"); }
}

// ── Histórico ──────────────────────────────────────────────
async function carregarHistorico() {
  const data = await get({ acao: "historico" });
  const hist = data.historico || [];
  const body = document.getElementById("histBody");
  if (!hist.length) {
    body.innerHTML = `<tr><td colspan="5"><div class="empty"><div class="ei">📜</div><p>Nenhum atendimento registrado ainda.</p></div></td></tr>`;
    return;
  }
  body.innerHTML = hist.map(h => `
    <tr>
      <td style="white-space:nowrap;color:var(--muted);font-size:.82rem">${h.timestamp}</td>
      <td><span class="badge-nome">${h.vendedora_nome}</span></td>
      <td style="font-weight:500">${h.contato}</td>
      <td style="color:var(--muted);font-size:.85rem">${h.telefone_contato || "—"}</td>
      <td class="msg-cell">${h.mensagem.substring(0,120)}${h.mensagem.length>120?"…":""}</td>
    </tr>
  `).join("");
}

// ── Helpers ────────────────────────────────────────────────
function iniciais(nome = "") {
  return nome.split(" ").slice(0,2).map(n => n[0]?.toUpperCase() || "").join("");
}
function formatTel(tel = "") {
  const n = tel.replace(/\D/g,"");
  if (n.length === 11) return `(${n.slice(0,2)}) ${n.slice(2,7)}-${n.slice(7)}`;
  if (n.length === 10) return `(${n.slice(0,2)}) ${n.slice(2,6)}-${n.slice(6)}`;
  return tel;
}

let toastTimer;
function toast(icon, msg, tipo) {
  const el = document.getElementById("toast");
  document.getElementById("toastIcon").textContent = icon;
  document.getElementById("toastMsg").textContent  = msg;
  el.className = "toast show " + tipo;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = "toast", 4000);
}
</script>
</body>
